apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: remote-intercom
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: relay=ghcr.io/m1ser4ble/remote-intercom-relay
    argocd-image-updater.argoproj.io/relay.update-strategy: latest
    argocd-image-updater.argoproj.io/relay.allow-tags: regexp:^sha-[0-9a-f]{7}$
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: git@github.com:m1ser4ble/remote-intercom.git
    targetRevision: main
    path: deploy/k8s/apps/remote-intercom-relay/overlays/home
  destination:
    server: https://kubernetes.default.svc
    namespace: remote-intercom
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
