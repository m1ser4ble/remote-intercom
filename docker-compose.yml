services:
  relay:
    image: golang:1.23
    working_dir: /app
    volumes:
      - ./relay:/app
    command: ["go", "run", "./cmd/relay"]
    environment:
      RELAY_ADDR: ":8080"
      # Example development secret; override in production.
      RELAY_TOKEN_SECRET: "change-me-change-me-change-me-change-me"
    ports:
      - "8080:8080"
